name: Cucumber Tests

on:

  # Auto trigger on push
  push:
    branches:
      - main
      - master

  # Auto trigger on PR
  pull_request:
    branches:
      - main
      - master

  # Manual trigger
  workflow_dispatch:
    inputs:

      testTag:
        description: 'Enter Cucumber Tag'
        required: true
        default: '@Smoke'

jobs:

  test:

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:

      # Step 1 - Download repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 - Install Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3 - Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # Step 4 - Setup Chrome browser
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # Step 5 - Verify Java version
      - name: Verify Java
        run: java -version

      # Step 6 - Verify Maven version
      - name: Verify Maven
        run: mvn -version

      # Step 7 - Verify Chrome version
      - name: Verify Chrome
        run: google-chrome --version

      # Step 8 - Build project
      - name: Build Project
        run: mvn clean install -DskipTests

      # Step 9 - Run Cucumber tests
      - name: Run Cucumber Tests
        run: |
          mvn test \
          -Dcucumber.filter.tags="${{ github.event.inputs.testTag || '@Smoke' }}"

      # Step 10 - Upload Surefire reports
      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      # Step 11 - Upload Extent Reports
      - name: Upload Extent Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: |
            test-output/
            reports/
            target/
